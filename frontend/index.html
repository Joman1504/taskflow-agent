<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TaskFlow Agent</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d0f12;
      --surface:   #13161b;
      --border:    #22272f;
      --accent:    #c8f04a;
      --accent-dim:#8faa2e;
      --text:      #e8ecf0;
      --muted:     #5a6472;
      --danger:    #ff5c5c;
      --info:      #4a9ef0;
      --radius:    10px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      border-bottom: 1px solid var(--border);
      padding: 1.25rem 2.5rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .logo-mark {
      width: 32px; height: 32px;
      background: var(--accent);
      border-radius: 6px;
      display: grid;
      place-items: center;
      flex-shrink: 0;
    }

    .logo-mark svg { width: 18px; height: 18px; }

    header h1 {
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      color: var(--text);
    }

    header span {
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      color: var(--muted);
      margin-left: auto;
      letter-spacing: 0.08em;
    }

    /* ── Layout ── */
    main {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: auto 1fr;
      gap: 1.5rem;
      max-width: 1400px;
      width: 100%;
      margin: 0 auto;
      padding: 2.5rem;
    }

    /* ── Input Panel (spans full width) ── */
    .input-panel {
      grid-column: 1 / -1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .panel-label {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      color: var(--muted);
      text-transform: uppercase;
    }

    textarea {
      width: 100%;
      min-height: 160px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 0.85rem;
      line-height: 1.7;
      padding: 1rem;
      resize: vertical;
      outline: none;
      transition: border-color 0.2s;
    }

    textarea::placeholder { color: var(--muted); }
    textarea:focus { border-color: var(--accent); }

    .input-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 0.75rem;
    }

    #char-count {
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      color: var(--muted);
    }

    .input-actions { display: flex; align-items: center; gap: 0.75rem; flex-wrap: wrap; }

    /* ── Buttons ── */
    button#analyze-btn {
      background: var(--accent);
      color: #0d0f12;
      border: none;
      border-radius: 6px;
      padding: 0.65rem 1.75rem;
      font-family: 'Syne', sans-serif;
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      transition: background 0.15s, transform 0.1s;
    }

    button#analyze-btn:hover  { background: #d8ff50; }
    button#analyze-btn:active { transform: scale(0.97); }
    button#analyze-btn:disabled {
      background: var(--accent-dim);
      cursor: not-allowed;
      opacity: 0.6;
    }

    .btn-secondary {
      background: transparent;
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.65rem 1.25rem;
      font-family: 'Syne', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      transition: border-color 0.15s, color 0.15s, transform 0.1s;
    }
    .btn-secondary:hover  { border-color: var(--accent); color: var(--accent); }
    .btn-secondary:active { transform: scale(0.97); }
    .btn-secondary:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── Spinner ── */
    .spinner {
      width: 14px; height: 14px;
      border: 2px solid #0d0f1240;
      border-top-color: #0d0f12;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      display: none;
    }
    .loading .spinner { display: block; }
    .loading .btn-text::after { content: 'Analyzing…'; }
    .idle    .btn-text::after { content: 'Analyze'; }

    .spinner-sm {
      width: 12px; height: 12px;
      border: 2px solid rgba(255,255,255,0.2);
      border-top-color: var(--text);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      display: none;
      flex-shrink: 0;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Transcribing status bar ── */
    .transcribe-bar {
      grid-column: 1 / -1;
      background: #0d1a2a;
      border: 1px solid #1e3a5f;
      border-radius: 6px;
      padding: 0.75rem 1rem;
      font-family: 'DM Mono', monospace;
      font-size: 0.78rem;
      color: var(--info);
      display: none;
      align-items: center;
      gap: 0.6rem;
    }
    .transcribe-bar.visible { display: flex; }
    .transcribe-bar .spinner-sm { display: block; border-top-color: var(--info); }

    /* ── Output Panels ── */
    .output-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      min-height: 320px;
    }

    .output-panel .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .stream-badge {
      font-family: 'DM Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.1em;
      color: #0d0f12;
      background: var(--accent);
      border-radius: 4px;
      padding: 0.2rem 0.5rem;
      text-transform: uppercase;
    }

    .output-title {
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--text);
    }

    .output-body {
      flex: 1;
      overflow-y: auto;
    }

    #narrative-content {
      font-size: 0.875rem;
      line-height: 1.8;
      color: #c4cdd8;
      white-space: pre-wrap;
    }

    /* ── Action Items ── */
    .action-item {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 0.75rem;
      align-items: start;
      padding: 0.85rem 1rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      margin-bottom: 0.65rem;
      background: var(--bg);
      animation: fadeUp 0.25s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .who-badge {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      background: #1e2a14;
      color: var(--accent);
      border: 1px solid #3a5020;
      border-radius: 4px;
      padding: 0.2rem 0.5rem;
      white-space: nowrap;
    }

    .what-text {
      font-size: 0.85rem;
      color: var(--text);
      line-height: 1.5;
    }

    .when-tag {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      color: var(--muted);
      white-space: nowrap;
    }

    /* ── Empty / Error states ── */
    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      color: var(--muted);
      font-size: 0.8rem;
      font-family: 'DM Mono', monospace;
      text-align: center;
      padding: 2rem;
    }

    .empty-state svg { opacity: 0.3; margin-bottom: 0.5rem; }

    .error-bar {
      grid-column: 1 / -1;
      background: #2a1010;
      border: 1px solid #5a2020;
      border-radius: 6px;
      padding: 0.75rem 1rem;
      font-family: 'DM Mono', monospace;
      font-size: 0.78rem;
      color: var(--danger);
      display: none;
    }
    .error-bar.visible { display: block; }

    /* ── Download bar ── */
    .download-bar {
      grid-column: 1 / -1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.85rem 1.25rem;
      display: none;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }
    .download-bar.visible { display: flex; }
    .download-bar > span {
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      color: var(--muted);
    }
  </style>
</head>
<body>

<header>
  <div class="logo-mark">
    <svg viewBox="0 0 24 24" fill="none" stroke="#0d0f12" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/>
    </svg>
  </div>
  <h1>TaskFlow Agent</h1>
  <span>DUAL-STREAM SYNTHESIS</span>
</header>

<main>

  <!-- Input -->
  <div class="input-panel">
    <div class="panel-label">Transcript Input</div>

    <!-- Hidden file inputs -->
    <input type="file" id="text-upload"  accept=".txt,.md,.text" style="display:none">
    <input type="file" id="audio-upload" accept=".mp3,.mp4,.m4a,.wav,.webm,.ogg,.flac,.mov,.mpeg,.mpga" style="display:none">

    <textarea
      id="transcript"
      placeholder="Paste your meeting or lecture transcript here, or upload an audio / video file to auto-transcribe…"
      spellcheck="false"
    ></textarea>

    <div class="input-footer">
      <span id="char-count">0 characters</span>
      <div class="input-actions">

        <!-- Upload plain text file -->
        <button class="btn-secondary" onclick="document.getElementById('text-upload').click()" title="Upload a .txt or .md file">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/>
          </svg>
          Upload Text
        </button>

        <!-- Upload audio / video for Whisper transcription -->
        <button id="audio-btn" class="btn-secondary" onclick="document.getElementById('audio-upload').click()" title="Upload audio or video — Whisper will transcribe it automatically">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/>
            <path d="M19 10v2a7 7 0 01-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/>
          </svg>
          <span class="spinner-sm" id="audio-spinner"></span>
          <span id="audio-btn-text">Transcribe Audio</span>
        </button>

        <button id="analyze-btn" class="idle" onclick="analyze()">
          <div class="spinner"></div>
          <span class="btn-text"></span>
        </button>
      </div>
    </div>
  </div>

  <!-- Transcribing status -->
  <div class="transcribe-bar" id="transcribe-bar">
    <div class="spinner-sm"></div>
    <span id="transcribe-msg">Transcribing audio with Whisper…</span>
  </div>

  <!-- Error bar -->
  <div class="error-bar" id="error-bar"></div>

  <!-- Stream 1: Narrative -->
  <div class="output-panel">
    <div class="panel-header">
      <span class="output-title">Narrative Notes</span>
      <span class="stream-badge">Stream 1</span>
    </div>
    <div class="output-body" id="narrative-body">
      <div class="empty-state">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/>
          <line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><line x1="10" y1="9" x2="8" y2="9"/>
        </svg>
        Narrative summary will appear here
      </div>
    </div>
  </div>

  <!-- Stream 2: Action Items -->
  <div class="output-panel">
    <div class="panel-header">
      <span class="output-title">Action Items</span>
      <span class="stream-badge">Stream 2</span>
    </div>
    <div class="output-body" id="actions-body">
      <div class="empty-state">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/>
        </svg>
        Who / What / When items will appear here
      </div>
    </div>
  </div>

  <!-- Download bar -->
  <div class="download-bar" id="download-bar">
    <span>Analysis complete — results ready to export. <span id="elapsed-time" style="font-size:0.7rem; color:var(--muted); margin-left:0.4rem;"></span></span>
    <button class="btn-secondary" onclick="downloadJSON()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
        <polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
      </svg>
      Download JSON
    </button>
  </div>

</main>

<script>
  const textarea      = document.getElementById('transcript');
  const charCount     = document.getElementById('char-count');
  const analyzeBtn    = document.getElementById('analyze-btn');
  const errorBar      = document.getElementById('error-bar');
  const textFileInput = document.getElementById('text-upload');
  const audioInput    = document.getElementById('audio-upload');
  const downloadBar   = document.getElementById('download-bar');
  const transcribeBar = document.getElementById('transcribe-bar');
  const audioBtn      = document.getElementById('audio-btn');
  const audioBtnText  = document.getElementById('audio-btn-text');
  const audioSpinner  = document.getElementById('audio-spinner');

  let lastResult = null;

  // ── Character count ──────────────────────────────────────────────────────────
  textarea.addEventListener('input', updateCharCount);
  function updateCharCount() {
    const n = textarea.value.length;
    charCount.textContent = `${n.toLocaleString()} character${n !== 1 ? 's' : ''}`;
  }

  // ── Text file upload ─────────────────────────────────────────────────────────
  textFileInput.addEventListener('change', () => {
    const file = textFileInput.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload  = (e) => { textarea.value = e.target.result; updateCharCount(); clearError(); };
    reader.onerror = () => showError('Could not read the file.');
    reader.readAsText(file);
    textFileInput.value = '';
  });

  // ── Audio / video upload → Whisper ──────────────────────────────────────────
  audioInput.addEventListener('change', async () => {
    const file = audioInput.files[0];
    if (!file) return;
    audioInput.value = '';

    setAudioLoading(true);
    clearError();

    const formData = new FormData();
    formData.append('file', file, file.name);

    try {
      const res = await fetch('/api/v1/transcripts/transcribe', {
        method: 'POST',
        body: formData,
      });

      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.detail || `Transcription failed (${res.status})`);
      }

      const data = await res.json();
      textarea.value = data.transcript;
      updateCharCount();
    } catch (err) {
      showError(err.message || 'Audio transcription failed.');
    } finally {
      setAudioLoading(false);
    }
  });

  function setAudioLoading(on) {
    audioBtn.disabled          = on;
    audioSpinner.style.display = on ? 'block' : 'none';
    audioBtnText.textContent   = on ? 'Transcribing…' : 'Transcribe Audio';
    transcribeBar.classList.toggle('visible', on);
  }

  // ── Analyze ──────────────────────────────────────────────────────────────────
  function setAnalyzeLoading(on) {
    analyzeBtn.disabled  = on;
    analyzeBtn.className = on ? 'loading' : 'idle';
  }

  function showError(msg) {
    errorBar.textContent = `⚠ ${msg}`;
    errorBar.classList.add('visible');
  }

  function clearError() {
    errorBar.classList.remove('visible');
  }

  function renderNarrative(text) {
    document.getElementById('narrative-body').innerHTML =
      `<div id="narrative-content">${escapeHtml(text)}</div>`;
  }

  function renderActions(items) {
    const el = document.getElementById('actions-body');
    if (!items.length) {
      el.innerHTML = `<div class="empty-state">No explicit action items detected.</div>`;
      return;
    }
    el.innerHTML = items.map((item, i) => `
      <div class="action-item" style="animation-delay:${i * 0.05}s">
        <span class="who-badge">${escapeHtml(item.who)}</span>
        <span class="what-text">${escapeHtml(item.what)}</span>
        <span class="when-tag">${item.when ? escapeHtml(item.when) : '—'}</span>
      </div>
    `).join('');
  }

  function escapeHtml(str) {
    return String(str)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function downloadJSON() {
    if (!lastResult) return;
    const blob = new Blob([JSON.stringify(lastResult, null, 2)], { type: 'application/json' });
    const url  = URL.createObjectURL(blob);
    const a    = Object.assign(document.createElement('a'), { href: url, download: 'taskflow-results.json' });
    a.click();
    URL.revokeObjectURL(url);
  }

  async function analyze() {
    const transcript = textarea.value.trim();
    if (!transcript) { showError('Please paste a transcript or transcribe an audio file first.'); return; }

    clearError();
    setAnalyzeLoading(true);
    const t0 = performance.now();

    try {
      const res = await fetch('/api/v1/transcripts/analyze', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ transcript }),
      });

      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.detail || `Server error ${res.status}`);
      }

      const data = await res.json();
      lastResult = data;
      renderNarrative(data.narrative_notes);
      renderActions(data.action_items);
      const elapsed = ((performance.now() - t0) / 1000).toFixed(2);
      document.getElementById('elapsed-time').textContent = `(${elapsed}s)`;
      downloadBar.classList.add('visible');

    } catch (err) {
      showError(err.message || 'An unexpected error occurred.');
    } finally {
      setAnalyzeLoading(false);
    }
  }
</script>
</body>
</html>
